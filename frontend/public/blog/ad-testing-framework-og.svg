<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">TUTORIALS</text>
  <!-- Decorative: A/B test split with funnel -->
  <!-- Split test boxes -->
  <rect x="520" y="180" width="120" height="160" rx="6" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.25"/>
  <text x="580" y="270" font-family="sans-serif" font-size="32" fill="#F97316" text-anchor="middle" font-weight="700" opacity="0.4">A</text>
  <rect x="760" y="180" width="120" height="160" rx="6" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.25"/>
  <text x="820" y="270" font-family="sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="700" opacity="0.2">B</text>
  <!-- Funnel lines converging -->
  <line x1="580" y1="340" x2="700" y2="430" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <line x1="820" y1="340" x2="700" y2="430" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <!-- Winner indicator -->
  <circle cx="700" cy="460" r="20" fill="#F97316" opacity="0.15"/>
  <path d="M 690 460 L 697 468 L 712 452" fill="none" stroke="#F97316" stroke-width="2" opacity="0.5"/>
  <!-- Data points -->
  <circle cx="545" y1="200" r="3" fill="#F97316" opacity="0.3" cy="200"/>
  <circle cx="560" cy="210" r="3" fill="#F97316" opacity="0.25"/>
  <circle cx="600" cy="200" r="3" fill="#F97316" opacity="0.2"/>
  <circle cx="615" cy="215" r="3" fill="#F97316" opacity="0.3"/>
  <!-- Horizontal divider -->
  <line x1="660" y1="180" x2="660" y2="340" stroke="#ffffff" stroke-width="0.5" opacity="0.08" stroke-dasharray="4,6"/>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">15</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>