<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">AI MARKETING</text>
  <!-- Decorative: AI head silhouette with signal waves -->
  <circle cx="750" cy="300" r="140" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.15"/>
  <circle cx="750" cy="300" r="100" fill="none" stroke="#F97316" stroke-width="1" opacity="0.25"/>
  <circle cx="750" cy="300" r="60" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.4"/>
  <circle cx="750" cy="300" r="20" fill="#F97316" opacity="0.3"/>
  <!-- Signal arcs -->
  <path d="M 820 230 Q 870 300 820 370" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.2"/>
  <path d="M 850 210 Q 920 300 850 390" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.15"/>
  <path d="M 880 190 Q 970 300 880 410" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.1"/>
  <!-- Large decorative number -->
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">01</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>