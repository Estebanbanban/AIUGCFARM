<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">UGC VIDEO</text>
  <!-- Decorative: Gallery / mosaic of video thumbnails -->
  <!-- Row 1 -->
  <rect x="500" y="160" width="100" height="130" rx="4" fill="#F97316" opacity="0.12"/>
  <rect x="612" y="160" width="100" height="130" rx="4" fill="#F97316" opacity="0.18"/>
  <rect x="724" y="160" width="100" height="130" rx="4" fill="#F97316" opacity="0.24"/>
  <!-- Row 2 -->
  <rect x="500" y="302" width="100" height="130" rx="4" fill="#F97316" opacity="0.2"/>
  <rect x="612" y="302" width="100" height="130" rx="4" fill="#F97316" opacity="0.14"/>
  <rect x="724" y="302" width="100" height="130" rx="4" fill="#F97316" opacity="0.28"/>
  <!-- Play icons on some -->
  <polygon points="540,215 540,240 560,227" fill="#ffffff" opacity="0.15"/>
  <polygon points="652,215 652,240 672,227" fill="#ffffff" opacity="0.12"/>
  <polygon points="764,355 764,380 784,367" fill="#ffffff" opacity="0.15"/>
  <!-- Check marks (conversion) -->
  <circle cx="838" y="160" r="10" fill="none" stroke="#F97316" stroke-width="1" opacity="0.3" cy="175"/>
  <path d="M 832 175 L 836 180 L 844 170" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.4"/>
  <!-- 15 counter -->
  <text x="870" y="320" font-family="sans-serif" font-size="60" fill="#F97316" opacity="0.12" font-weight="800">15</text>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">13</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>