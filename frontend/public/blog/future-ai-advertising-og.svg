<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#111111"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">AI MARKETING</text>
  <!-- Decorative: Futuristic hexagon network -->
  <polygon points="700,200 760,230 760,290 700,320 640,290 640,230" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <polygon points="780,260 840,290 840,350 780,380 720,350 720,290" fill="none" stroke="#F97316" stroke-width="1" opacity="0.15"/>
  <polygon points="620,260 680,290 680,350 620,380 560,350 560,290" fill="none" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <polygon points="700,330 760,360 760,420 700,450 640,420 640,360" fill="none" stroke="#F97316" stroke-width="1" opacity="0.15"/>
  <!-- Connection lines -->
  <line x1="700" y1="320" x2="700" y2="330" stroke="#F97316" stroke-width="0.5" opacity="0.3"/>
  <line x1="760" y1="290" x2="780" y2="260" stroke="#F97316" stroke-width="0.5" opacity="0.2"/>
  <line x1="640" y1="290" x2="620" y2="260" stroke="#F97316" stroke-width="0.5" opacity="0.2"/>
  <!-- Center glow -->
  <circle cx="700" cy="270" r="12" fill="#F97316" opacity="0.15"/>
  <circle cx="700" cy="270" r="5" fill="#F97316" opacity="0.4"/>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">06</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>