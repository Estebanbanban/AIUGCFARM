<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">UGC VIDEO</text>
  <!-- Decorative: Three-part framework blocks -->
  <!-- Hook -->
  <rect x="480" y="170" width="300" height="80" rx="6" fill="#F97316" opacity="0.25"/>
  <text x="630" y="218" font-family="sans-serif" font-size="18" fill="#F97316" text-anchor="middle" font-weight="700" opacity="0.7">HOOK</text>
  <!-- Body -->
  <rect x="480" y="270" width="300" height="80" rx="6" fill="#F97316" opacity="0.15"/>
  <text x="630" y="318" font-family="sans-serif" font-size="18" fill="#F97316" text-anchor="middle" font-weight="700" opacity="0.5">BODY</text>
  <!-- CTA -->
  <rect x="480" y="370" width="300" height="80" rx="6" fill="#F97316" opacity="0.1"/>
  <text x="630" y="418" font-family="sans-serif" font-size="18" fill="#F97316" text-anchor="middle" font-weight="700" opacity="0.35">CTA</text>
  <!-- Connecting arrows -->
  <line x1="630" y1="250" x2="630" y2="270" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <polygon points="625,268 630,278 635,268" fill="#F97316" opacity="0.3"/>
  <line x1="630" y1="350" x2="630" y2="370" stroke="#F97316" stroke-width="1.5" opacity="0.25"/>
  <polygon points="625,368 630,378 635,368" fill="#F97316" opacity="0.25"/>
  <!-- Side accent lines -->
  <line x1="460" y1="170" x2="460" y2="450" stroke="#F97316" stroke-width="1" opacity="0.1" stroke-dasharray="4,8"/>
  <line x1="800" y1="170" x2="800" y2="450" stroke="#F97316" stroke-width="1" opacity="0.1" stroke-dasharray="4,8"/>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">07</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>