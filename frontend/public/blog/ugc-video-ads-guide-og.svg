<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">UGC VIDEO</text>
  <!-- Decorative: Large play button with radiating circles (hero/complete guide feel) -->
  <circle cx="720" cy="310" r="180" fill="none" stroke="#F97316" stroke-width="0.5" opacity="0.08"/>
  <circle cx="720" cy="310" r="140" fill="none" stroke="#F97316" stroke-width="0.8" opacity="0.12"/>
  <circle cx="720" cy="310" r="100" fill="none" stroke="#F97316" stroke-width="1" opacity="0.15"/>
  <circle cx="720" cy="310" r="60" fill="url(#circleGrad)"/>
  <!-- Large play triangle -->
  <polygon points="700,280 700,340 750,310" fill="#F97316" opacity="0.5"/>
  <!-- Orbit dots -->
  <circle cx="720" cy="130" r="4" fill="#F97316" opacity="0.25"/>
  <circle cx="900" cy="310" r="4" fill="#F97316" opacity="0.2"/>
  <circle cx="720" cy="490" r="4" fill="#F97316" opacity="0.25"/>
  <circle cx="540" cy="310" r="4" fill="#F97316" opacity="0.2"/>
  <!-- Subtle connection lines to orbit dots -->
  <line x1="720" y1="134" x2="720" y2="170" stroke="#F97316" stroke-width="0.5" opacity="0.1"/>
  <line x1="896" y1="310" x2="860" y2="310" stroke="#F97316" stroke-width="0.5" opacity="0.1"/>
  <line x1="720" y1="486" x2="720" y2="450" stroke="#F97316" stroke-width="0.5" opacity="0.1"/>
  <line x1="544" y1="310" x2="580" y2="310" stroke="#F97316" stroke-width="0.5" opacity="0.1"/>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">14</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>