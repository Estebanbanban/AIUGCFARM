<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">ECOMMERCE</text>
  <!-- Decorative: Shopping bag with play button -->
  <!-- Bag outline -->
  <path d="M 640 200 L 640 440 Q 640 460 660 460 L 840 460 Q 860 460 860 440 L 860 200 Z" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.2"/>
  <!-- Bag handle -->
  <path d="M 700 200 Q 700 140 750 140 Q 800 140 800 200" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.25"/>
  <!-- Play button inside -->
  <polygon points="720,300 720,380 780,340" fill="#F97316" opacity="0.25"/>
  <!-- Step indicators on right side -->
  <circle cx="920" cy="220" r="12" fill="none" stroke="#F97316" stroke-width="1" opacity="0.3"/>
  <text x="920" y="225" font-family="sans-serif" font-size="12" fill="#F97316" text-anchor="middle" opacity="0.4">1</text>
  <line x1="920" y1="232" x2="920" y2="268" stroke="#F97316" stroke-width="0.5" opacity="0.2"/>
  <circle cx="920" cy="280" r="12" fill="none" stroke="#F97316" stroke-width="1" opacity="0.25"/>
  <text x="920" y="285" font-family="sans-serif" font-size="12" fill="#F97316" text-anchor="middle" opacity="0.35">2</text>
  <line x1="920" y1="292" x2="920" y2="328" stroke="#F97316" stroke-width="0.5" opacity="0.2"/>
  <circle cx="920" cy="340" r="12" fill="none" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <text x="920" y="345" font-family="sans-serif" font-size="12" fill="#F97316" text-anchor="middle" opacity="0.3">3</text>
  <line x1="920" y1="352" x2="920" y2="388" stroke="#F97316" stroke-width="0.5" opacity="0.2"/>
  <circle cx="920" cy="400" r="12" fill="none" stroke="#F97316" stroke-width="1" opacity="0.15"/>
  <text x="920" y="405" font-family="sans-serif" font-size="12" fill="#F97316" text-anchor="middle" opacity="0.25">4</text>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">11</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>