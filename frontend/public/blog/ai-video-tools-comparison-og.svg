<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">AI MARKETING</text>
  <!-- Decorative: Comparison chart bars -->
  <rect x="480" y="380" width="50" height="120" rx="4" fill="#F97316" opacity="0.35"/>
  <rect x="550" y="300" width="50" height="200" rx="4" fill="#F97316" opacity="0.25"/>
  <rect x="620" y="250" width="50" height="250" rx="4" fill="#F97316" opacity="0.45"/>
  <rect x="690" y="330" width="50" height="170" rx="4" fill="#F97316" opacity="0.2"/>
  <rect x="760" y="280" width="50" height="220" rx="4" fill="#F97316" opacity="0.3"/>
  <rect x="830" y="350" width="50" height="150" rx="4" fill="#F97316" opacity="0.15"/>
  <rect x="900" y="220" width="50" height="280" rx="4" fill="#F97316" opacity="0.4"/>
  <!-- Horizontal baseline -->
  <line x1="460" y1="500" x2="970" y2="500" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <!-- Winner indicator -->
  <circle cx="645" cy="230" r="6" fill="#F97316" opacity="0.6"/>
  <line x1="645" y1="236" x2="645" y2="250" stroke="#F97316" stroke-width="1" opacity="0.4"/>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">03</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>