<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">UGC VIDEO</text>
  <!-- Decorative: VS split - two abstract shapes -->
  <rect x="500" y="140" width="120" height="350" rx="8" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.2"/>
  <rect x="510" y="150" width="100" height="330" rx="4" fill="#F97316" opacity="0.05"/>
  <!-- VS divider -->
  <line x1="680" y1="140" x2="680" y2="490" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <text x="680" y="325" font-family="sans-serif" font-size="28" fill="#F97316" text-anchor="middle" font-weight="700" opacity="0.6">VS</text>
  <!-- Right shape -->
  <rect x="740" y="140" width="120" height="350" rx="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.12"/>
  <rect x="750" y="150" width="100" height="330" rx="4" fill="#ffffff" opacity="0.03"/>
  <!-- Circuit lines on left -->
  <circle cx="560" cy="230" r="8" fill="#F97316" opacity="0.4"/>
  <circle cx="560" cy="315" r="8" fill="#F97316" opacity="0.3"/>
  <circle cx="560" cy="400" r="8" fill="#F97316" opacity="0.2"/>
  <!-- Human dots on right -->
  <circle cx="800" cy="230" r="8" fill="#ffffff" opacity="0.2"/>
  <circle cx="800" cy="315" r="8" fill="#ffffff" opacity="0.15"/>
  <circle cx="800" cy="400" r="8" fill="#ffffff" opacity="0.1"/>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">02</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>