<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">TUTORIALS</text>
  <!-- Decorative: Growth arrow / staircase -->
  <line x1="480" y1="460" x2="920" y2="460" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <line x1="480" y1="460" x2="480" y2="160" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <!-- Staircase steps -->
  <rect x="520" y="400" width="60" height="60" fill="#F97316" opacity="0.1"/>
  <rect x="600" y="340" width="60" height="120" fill="#F97316" opacity="0.15"/>
  <rect x="680" y="280" width="60" height="180" fill="#F97316" opacity="0.2"/>
  <rect x="760" y="220" width="60" height="240" fill="#F97316" opacity="0.3"/>
  <rect x="840" y="170" width="60" height="290" fill="#F97316" opacity="0.4"/>
  <!-- Arrow tip -->
  <polygon points="900,170 920,180 900,190" fill="#F97316" opacity="0.5"/>
  <line x1="840" y1="180" x2="900" y2="180" stroke="#F97316" stroke-width="2" opacity="0.4"/>
  <!-- Labels -->
  <text x="550" y="490" font-family="sans-serif" font-size="10" fill="#ffffff" opacity="0.15" text-anchor="middle">LAUNCH</text>
  <text x="870" y="490" font-family="sans-serif" font-size="10" fill="#ffffff" opacity="0.15" text-anchor="middle">SCALE</text>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">04</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>