<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">ECOMMERCE</text>
  <!-- Decorative: Music note / vertical video frame with wave -->
  <!-- Phone frame -->
  <rect x="680" y="150" width="160" height="320" rx="16" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.2"/>
  <!-- Screen -->
  <rect x="690" y="170" width="140" height="280" rx="8" fill="#F97316" opacity="0.04"/>
  <!-- Sound wave inside -->
  <path d="M 720 280 Q 730 250 740 280 Q 750 310 760 280 Q 770 250 780 280 Q 790 310 800 280" fill="none" stroke="#F97316" stroke-width="2" opacity="0.35"/>
  <!-- Engagement indicators -->
  <circle cx="800" cy="380" r="8" fill="#F97316" opacity="0.2"/>
  <circle cx="800" cy="350" r="8" fill="#F97316" opacity="0.25"/>
  <circle cx="800" cy="320" r="8" fill="#F97316" opacity="0.15"/>
  <!-- Scroll indicator -->
  <line x1="760" y1="490" x2="760" y2="530" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <polygon points="755,525 760,535 765,525" fill="#F97316" opacity="0.2"/>
  <!-- Trending arrow -->
  <path d="M 540 400 L 580 350 L 620 370 L 660 280" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.2"/>
  <polygon points="655,275 665,275 660,265" fill="#F97316" opacity="0.25"/>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">12</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>