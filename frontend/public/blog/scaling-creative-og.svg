<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#111111"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">AI MARKETING</text>
  <!-- Decorative: Multiplying content grid -->
  <!-- Row 1 -->
  <rect x="520" y="180" width="80" height="50" rx="3" fill="#F97316" opacity="0.1"/>
  <rect x="610" y="180" width="80" height="50" rx="3" fill="#F97316" opacity="0.15"/>
  <rect x="700" y="180" width="80" height="50" rx="3" fill="#F97316" opacity="0.2"/>
  <rect x="790" y="180" width="80" height="50" rx="3" fill="#F97316" opacity="0.25"/>
  <!-- Row 2 -->
  <rect x="520" y="240" width="80" height="50" rx="3" fill="#F97316" opacity="0.15"/>
  <rect x="610" y="240" width="80" height="50" rx="3" fill="#F97316" opacity="0.2"/>
  <rect x="700" y="240" width="80" height="50" rx="3" fill="#F97316" opacity="0.25"/>
  <rect x="790" y="240" width="80" height="50" rx="3" fill="#F97316" opacity="0.3"/>
  <!-- Row 3 -->
  <rect x="520" y="300" width="80" height="50" rx="3" fill="#F97316" opacity="0.2"/>
  <rect x="610" y="300" width="80" height="50" rx="3" fill="#F97316" opacity="0.25"/>
  <rect x="700" y="300" width="80" height="50" rx="3" fill="#F97316" opacity="0.3"/>
  <rect x="790" y="300" width="80" height="50" rx="3" fill="#F97316" opacity="0.35"/>
  <!-- Row 4 -->
  <rect x="520" y="360" width="80" height="50" rx="3" fill="#F97316" opacity="0.25"/>
  <rect x="610" y="360" width="80" height="50" rx="3" fill="#F97316" opacity="0.3"/>
  <rect x="700" y="360" width="80" height="50" rx="3" fill="#F97316" opacity="0.35"/>
  <rect x="790" y="360" width="80" height="50" rx="3" fill="#F97316" opacity="0.4"/>
  <!-- Expansion arrows -->
  <line x1="890" y1="290" x2="940" y2="290" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <polygon points="935,285 945,290 935,295" fill="#F97316" opacity="0.3"/>
  <line x1="660" y1="425" x2="660" y2="470" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <polygon points="655,465 660,475 665,465" fill="#F97316" opacity="0.3"/>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">10</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>