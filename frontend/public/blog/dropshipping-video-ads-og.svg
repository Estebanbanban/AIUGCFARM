<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="url(#barGrad)"/>
  <text x="40" y="60" font-family="sans-serif" font-size="14" fill="#F97316" letter-spacing="3" text-anchor="start" font-weight="600">ECOMMERCE</text>
  <!-- Decorative: Fast shipping / speed lines with box -->
  <!-- Package box -->
  <rect x="680" y="240" width="140" height="140" rx="4" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <line x1="680" y1="290" x2="820" y2="290" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <line x1="750" y1="240" x2="750" y2="290" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <!-- Speed lines -->
  <line x1="500" y1="270" x2="650" y2="270" stroke="#F97316" stroke-width="2" opacity="0.15"/>
  <line x1="530" y1="310" x2="660" y2="310" stroke="#F97316" stroke-width="1.5" opacity="0.12"/>
  <line x1="550" y1="350" x2="670" y2="350" stroke="#F97316" stroke-width="1" opacity="0.1"/>
  <line x1="520" y1="390" x2="660" y2="390" stroke="#F97316" stroke-width="0.8" opacity="0.08"/>
  <!-- Dollar signs (fast & cheap) -->
  <text x="870" y="340" font-family="sans-serif" font-size="40" fill="#F97316" opacity="0.15">$</text>
  <text x="920" y="300" font-family="sans-serif" font-size="30" fill="#F97316" opacity="0.1">$</text>
  <!-- Timer icon -->
  <circle cx="900" cy="220" r="25" fill="none" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <line x1="900" y1="220" x2="900" y2="205" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <line x1="900" y1="220" x2="912" y2="225" stroke="#F97316" stroke-width="1" opacity="0.25"/>
  <text x="1100" y="520" font-family="sans-serif" font-size="200" fill="#ffffff" opacity="0.03" text-anchor="end" font-weight="900">09</text>
  <text x="1160" y="610" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="end">CineRads</text>
</svg>