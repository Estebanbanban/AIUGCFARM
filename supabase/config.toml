[api]
enabled = true

# All functions bypass gateway JWT verification — each function
# implements its own auth via requireUserId() or webhook signatures.
# This prevents the Supabase gateway from incorrectly rejecting valid tokens.
[functions.confirm-products]
verify_jwt = false

